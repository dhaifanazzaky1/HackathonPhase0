<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styleProfile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="wrapper">

        <nav class="navbar-home">
            <img src="img/back.png" alt="Logo Retroverse" class="logo-back" onclick="balik()">
            <div class="nav-icons">
                <img src="img/logo-nav.png" alt="Logo Retroverse" class="logo-home">
            </div>
        </nav>

        <h1>Profile</h1>
        <div class="list profile">
            <label for="">Name</label>
            <p id="nama"></p>
            <i class='fas fa-edit' onclick="editNama()"></i>


        </div>
        <div class="list profile">
            <label for="">email</label>
            <p id="email"></p>
        </div>
        <div class="list profile">
            <label for="">password</label>
            <p id="password"></p>
            <i class='fas fa-edit' onclick="editPassword()"></i>
        </div>

        <button onclick="keluar()" class="logut"></button>


    </div>
    <script src="profile.js"></script>
</body>
</html>
