<!DOCTYPE html>
<html>

<head>
    <title>Home | Retroverse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styleHomepage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- NAV BAR -->
    <div>
        <nav class="navbar-home">
            <img src="/img/logo-nav.png" alt="Logo Retroverse" class="logo-home">
            <div class="nav-icons">
                <a href="#" onclick="toggleCartPopup(event)" class="cart-wrapper">
                    <img src="/img/cart-icon.png" alt="cart-icon" class="cart">
                    <span class="totalCart" id="totalCart">0</span>
                </a>
                <div class="cart-popup" id="cartPopup">
                    <div class="container mt-5">
                        <div class="row">
                            <!-- Shopping Cart Items -->
                            <div class="col-lg-8">
                                <h3>Your Shopping Cart</h3>
                                <div id="cartItemsContainer"></div>
                            </div>

                            <!-- Cart Summary -->
                            <div class="col-lg-4">
                                <div class="cart-summary">
                                    <h4>Cart Summary</h4>
                                    <ul class="list-unstyled">
                                        <li class="d-flex justify-content-between">
                                            <span>Subtotal:</span>
                                            <span id="cartSubtotal">$0.00</span>
                                        </li>
                                        <li class="d-flex justify-content-between">
                                            <span>Shipping:</span>
                                            <span>$5.00</span>
                                        </li>
                                        <li class="d-flex justify-content-between">
                                            <span class="total-price">Total:</span>
                                            <span class="total-price" id="cartTotal">$5.00</span>
                                        </li>
                                    </ul>
                                    <a href="checkout.html"><button class="btn-checkout">Proceed to Checkout</button></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="profile.html">
                    <img src="/img/profile.png" alt="profile-icon" class="cart">
                </a>
            </div>
        </nav>
    </div>
    <!-- Carousel -->
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/img/carousel1.jpg" class="d-block w-100" alt="carousel-img1">
            </div>
            <div class="carousel-item">
                <img src="/img/carousel2.jpg" class="d-block w-100" alt="carousel-img2">
            </div>
            <div class="carousel-item">
                <img src="/img/carousel3.jpg" class="d-block w-100" alt="carousel-img3">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    <div class="container bg-white">
        <nav class="navbar navbar-expand-lg bg-white py-3">
            <div class="container-fluid px-0">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myNav"
                    aria-controls="myNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="myNav">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link active" href="#" onclick="filterProduk('all')">All</a>
                        <a class="nav-link" onclick="filterProduk('jaket')">Jacket</a>
                        <a class="nav-link" onclick="filterProduk('kaos')">T-Shirt</a>
                        <a class="nav-link" onclick="filterProduk('celana')">Pants</a>
                        <a class="nav-link" onclick="filterProduk('Accessories')">Accessories</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="row" id="productGrid"></div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="homepage.js"></script>
</body>

</html>
