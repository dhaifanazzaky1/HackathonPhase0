<!DOCTYPE html>
<html>

<head>
  <title>Home | Retroverse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="homepage.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- Nav Bar -->
  <nav class="navbar-home">
    <img src="img/logo-nav.png" alt="Logo Retroverse" class="logo-home">
    <div class="nav-icons">
        <a  href="cart.html">
            <img  src="img/cart-icon.png" alt="cart-icon" class="cart">
        </a>
        <a href="profile.html">
            <img src="img/profile.png" alt="profile-icon" class="cart">
        </a>
    </div>
  </nav>
  <!-- carousel -->
  <div id="carouselExampleIndicators" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
        aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
        aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
        aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="img/carousel1.jpg" class="d-block w-100" alt="carousel-img1">
      </div>
      <div class="carousel-item">
        <img src="img/carousel2.jpg" class="d-block w-100" alt="carousel-img2">
      </div>
      <div class="carousel-item">
        <img src="img/carousel3.jpg" class="d-block w-100" alt="carousel-img3">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
      data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
      data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
  <!-- Product List -->
  <div class="container bg-white">
    <div class="row" id="productGrid"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script>

    ;
    function renderProduk() {
      const grid = document.getElementById("productGrid");

      let codePerCard = ""; 

      for (let i = 0; i < products.length; i++) {
        const produk = products[i];        
        codePerCard += `
      <div class="col-lg-3 col-sm-6 d-flex flex-column align-items-center justify-content-center product-item my-3">
        <div class="product">
          <img src="${produk.img}" alt="${produk.title}">
          <ul class="d-flex align-items-center justify-content-center list-unstyled icons">
            <li class="icon"><span class="fas fa-expand-arrows-alt"></span></li>
            <li class="icon mx-3"><span class="far fa-heart"></span></li>
            <li class="icon"><span class="fas fa-shopping-bag"></span></li>
          </ul>
          <div class="tag ' + ${produk.tagClass} + '">${produk.tag}</div>
        </div>
        <div class="title pt-4 pb-1">${produk.title}</div>
        <div class="price">$ ${produk.price.toFixed(1)}</div>
      </div>
    `;
      }

      grid.innerHTML = codePerCard;
    }

    renderProduk(); S
  </script>
</body>

</html>
