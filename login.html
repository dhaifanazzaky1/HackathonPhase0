<!DOCTYPE html>
<html>
<head>
    <title>Login | Thrift Shop</title>
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>

    <div class="container">
        <h1 class="title">Welome Thrifters!</h1>

        <form class="login-form">
            <label for="username">Username atau Email</label>
            <input type="text" id="username" placeholder="Masukkan username atau email Anda">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan kata sandi Anda">

            <button type="button" onclick="window.location.href='homepage.html'">Masuk</button>

            <p class="register">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </p>
        </form>
    </div>

</body>
</html>
