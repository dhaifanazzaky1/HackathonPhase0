<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Retroverse</title>
    <link rel="stylesheet" href="styleHomepage.css">
    <link rel="stylesheet" href="styleCheckout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar-home">
        <img src="img/logo-nav.png" alt="Logo Retroverse" class="logo-home">
        <div class="nav-icons">
            <a href="homepage.html">
                <img src="img/cart-icon.png" class="cart">
            </a>
            <a href="profile.html">
                <img src="img/profile.png" class="cart">
            </a>
        </div>
    </nav>
    <!-- ================= TITLE ================= -->
    <div class="checkout-header">
        <a href="homepage.html">
            <img src="img/back.png" alt="Back Button" class="back-button">
        </a>
        <h1 class="h1-co">CHECKOUT</h1>
    </div>
    <!-- ================= CONTAINER ================= -->
    <div class="checkout-container">
        <!-- ========================================= -->
                        <!-- KOLOM KIRI -->
        <!-- ========================================= -->
        <div class="checkout-left">
            <div class="cart-list">
                <div class="checkout-title">
                    <h2>Cart List</h2>
                </div>

                <!-- isi cart otomatis -->
                <div id="checkoutItems">
                </div>
            </div>
            <div class="cart-total">
                <div>
                    <h3>Subtotal</h3>
                </div>
                <div>
                    <h3 id="subtotalText">$0.00</h3>
                </div>
            </div>
        </div>
         <!-- ========================================= -->
                        <!-- KOLOM KANAN -->
        <!-- ========================================= -->
        <div class="checkout-right">
            <div class="checkout-form">
                <h2>Detail Pengiriman</h2>
                <div class="form-data">
                    <label class="form-label">Nama</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Masukkan Nama Lengkap Anda">
                </div>
                <div class="form-data">
                    <label class="form-label">No. HP</label>
                    <input type="text" class="form-control" id="phoneNumber" placeholder="08xxxxxxxxxx">
                </div>
                <div class="form-data">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="@email.com">
                </div>
                <div class="form-data">
                    <label class="form-label">Alamat</label>
                    <textarea class="form-control" rows="4" id="address"></textarea>
                </div>
                <div class="row">
                    <div class="detail-addres form-data">
                        <label class="form-label">Kota/Kabupaten</label>
                        <input type="text" class="form-control" id="city">
                    </div>
                    <div class="detail-addres form-data">
                        <label class="form-label">Kode POS</label>
                        <input type="text" class="form-control" id="postalCode">
                    </div>
                </div>
                <div class="payment-section">
                    <label class="form-label">Payment Method</label>
                    <select class="form-select" id="paymentMethod">
                        <option value="">Pilih Pembayaran</option>
                        <option>Transfer Bank</option>
                        <option>E-Wallet</option>
                        <option>COD</option>
                    </select>
                </div>
            </div>
            <div class="payment-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Biaya Pengiriman</span>
                    <span>$5.00</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summaryTotal">$5.00</span>
                </div>
                <button class="btn-pay" onclick="checkoutOrder()">
                    BAYAR
                </button>
            </div>
        </div>
    </div>
    <script src="checkout.js"></script>
</body>
</html>
