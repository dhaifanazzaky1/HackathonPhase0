<!DOCTYPE html>
<html>
<head>
    <title>Checkout | Retroverse</title>
    <link rel="stylesheet" href="homepage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Nav Bar -->
  <div >
    <nav class="navbar-home">
      <img src="img/logo-nav.png" alt="Logo Retroverse" class="logo-home">
      <div class="nav-icons">
          <a href="profile.html">
              <img src="img/profile.png" alt="profile-icon" class="cart">
          </a>
      </div>
      </nav>
    </div>
     <div>
        <h1 class="h1-co">CHECKOUT</h1>
     </div>
     <div class="container mt-5">
  <div class="row">

    <!-- ================= LEFT: CART ================= -->
    <div class="col-md-8">

      <div id="checkoutItems"></div>

    </div>
    <!-- ================= RIGHT: TOTAL ================= -->
    <div class="col-md-4">

      <div class="card p-4">
        <h5 class="mb-3">Ringkasan</h5>

        <div class="d-flex justify-content-between mb-2">
          <span>Subtotal</span>
          <span id="subtotal"></span>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Ongkir</span>
          <span>$5.00</span>
        </div>

        <hr>

        <div class="d-flex justify-content-between fw-bold">
          <span>Total</span>
          <span id="total"></span>
        </div>

        <button class="btn btn-dark w-100 mt-3">
          Checkout
        </button>
      </div>

    </div>

  </div>
</div>
<script>
  let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];

        let container = document.getElementById("checkoutItems");

        let subtotal = 0;
        let html = "";

        for (let i = 0; i < cartItems.length; i++) {

            let item = cartItems[i];

            subtotal += item.price;

            html += `
            <div class="card mb-3 p-3">
                <div class="row align-items-center">

                    <div class="col-md-3">
                        <img src="${item.img}" class="img-fluid rounded">
                    </div>

                    <div class="col-md-4">
                        <h5>${item.title}</h5>
                    </div>

                    <div class="col-md-2">
                        $${item.price.toFixed(2)}
                    </div>

                    <div class="col-md-3 text-end">
                        <b>$${item.price.toFixed(2)}</b>
                    </div>

                </div>
            </div>
            `;
        }

        container.innerHTML = html;

        let shipping = 5;

        document.getElementById("subtotal").innerHTML =
        "$" + subtotal.toFixed(2);

        document.getElementById("total").innerHTML =
        "$" + (subtotal + shipping).toFixed(2);
</script>

</body>
</html>
